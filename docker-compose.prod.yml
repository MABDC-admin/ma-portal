version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: ma-portal-mongodb
    restart: unless-stopped
    command: ["mongod", "--auth", "--keyFile", "/data/keyfile", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "127.0.0.1:27017:27017"
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ma_portal
    volumes:
      - mongodb_data:/data/db
      - ./mongo-keyfile:/data/keyfile:ro

  frontend:
    build: .
    container_name: ma-portal-frontend
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      - mongodb
    env_file:
      - .env

volumes:
  mongodb_data:
